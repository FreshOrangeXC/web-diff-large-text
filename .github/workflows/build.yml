name: Package the wasm application

on: 
  push

permissions:
  contents: write

jobs: 
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install wasm tool
        run: cargo install wasm-pack

      - name: Build wasm lib to dist
        run: wasm-pack build --target web --release --out-dir dist

      - name: Copy index.html to dist
        run: cp index.html dist/

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist